name: Build and push docker image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: build image
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build --pull

      - name: push image to Github Packages
        run: |
          docker image tag photo-carousel-project:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          docker image push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/${{ github.repository }}
